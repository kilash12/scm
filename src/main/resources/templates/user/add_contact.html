<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#content},~{::title},~{::script})}">
<head>
  <title>Add Contact - Smart Contact Manager</title>
</head>
<body>
<div id="content">
  <!-- Sidebar (only when logged in) -->
  <div th:if="${loggedInUser}">
    <div th:replace="~{user/sidebar :: sidebar}"></div>
  </div>

  <div class="sm:pl-64 pt-20">
    <div class="grid grid-cols-12">
      <div class="col-span-3"></div>
      <div class="col-span-12 md:col-span-6">
        <div class="card block p-6 bg-white border border-gray-200 rounded-lg shadow hover:bg-gray-100 dark:bg-gray-800 dark:border-gray-700 dark:hover:bg-gray-700">
          <!-- Flash messages -->
          <div th:replace="~{message :: messagebox}"></div>

          <h1 class="text-2xl font-semibold">Add New Contact</h1>
          <p class="text-gray-500">This contact will be stored on cloud. You can also email this client directly from SCM.</p>

          <form th:action="@{/user/contacts/add}" th:object="${contactForm}" method="post" enctype="multipart/form-data" class="mt-8">
            <!-- Name -->
            <div class="mb-3">
              <label for="name" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Contact Name</label>
              <div class="relative mb-1">
                <div class="absolute inset-y-0 start-0 flex items-center ps-3.5 pointer-events-none">
                  <i class="fa-regular fa-user w-4 h-4"></i>
                </div>
                <input type="text" id="name" th:field="*{name}" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full ps-10 p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="John Doe">
              </div>
              <p class="text-red-500 text-sm" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Invalid name</p>
            </div>

            <!-- Email -->
            <div class="mb-3">
              <label for="email" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Contact Email</label>
              <div class="relative mb-1">
                <div class="absolute inset-y-0 start-0 flex items-center ps-3.5 pointer-events-none">
                  <i class="fa-regular fa-envelope w-4 h-4"></i>
                </div>
                <input type="email" id="email" th:field="*{email}" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full ps-10 p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="example@domain.com">
              </div>
              <p class="text-red-500 text-sm" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Invalid email</p>
            </div>

            <!-- Phone Number -->
            <div class="mb-3">
              <label for="phone" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Contact Phone</label>
              <div class="relative mb-1">
                <div class="absolute inset-y-0 start-0 flex items-center ps-3.5 pointer-events-none">
                  <i class="fa-solid fa-phone w-4 h-4"></i>
                </div>
                <input type="tel" id="phone" th:field="*{phoneNumber}" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full ps-10 p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="9876543210">
              </div>
              <p class="text-red-500 text-sm" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}">Invalid phone number</p>
            </div>

            <!-- Address -->
            <div class="mb-3">
              <label for="address" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Contact Address</label>
              <textarea id="address" th:field="*{address}" rows="3" class="block p-2.5 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="Address of the contact"></textarea>
              <p class="text-red-500 text-sm" th:if="${#fields.hasErrors('address')}" th:errors="*{address}">Invalid address</p>
            </div>

            <!-- Description -->
            <div class="mb-3">
              <label for="description" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Contact Description</label>
              <textarea id="description" th:field="*{description}" rows="3" class="block p-2.5 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="Write about your contact"></textarea>
            </div>

            <!-- Social Links (two columns) -->
            <div class="flex flex-col md:flex-row space-y-3 md:space-y-0 md:space-x-3 mb-3">
              <div class="w-full">
                <label for="website" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Website</label>
                <div class="relative mb-1">
                  <div class="absolute inset-y-0 start-0 flex items-center ps-3.5 pointer-events-none">
                    <i class="fa-solid fa-earth-americas w-4 h-4"></i>
                  </div>
                  <input type="url" id="website" th:field="*{websiteLink}" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full ps-10 p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="https://example.com">
                </div>
              </div>
              <div class="w-full">
                <label for="linkedin" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">LinkedIn</label>
                <div class="relative mb-1">
                  <div class="absolute inset-y-0 start-0 flex items-center ps-3.5 pointer-events-none">
                    <i class="fa-brands fa-linkedin w-4 h-4"></i>
                  </div>
                  <input type="url" id="linkedin" th:field="*{linkedInLink}" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full ps-10 p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="https://linkedin.com/in/username">
                </div>
              </div>
            </div>

            <!-- Contact Image -->
            <div class="mb-3">
              <label for="contactImage" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Contact Image</label>
              <input type="file" id="contactImage" th:field="*{contactImage}" class="block w-full text-sm text-gray-900 border border-gray-300 rounded-lg cursor-pointer bg-gray-50 dark:text-gray-400 focus:outline-none dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400">
              <p class="text-red-500 text-sm" th:if="${#fields.hasErrors('contactImage')}" th:errors="*{contactImage}">Invalid file</p>
              <img id="upload_image_preview" class="max-h-52 mx-auto rounded-lg shadow m-3" src="" alt="Image preview">
            </div>

            <!-- Favorite Checkbox -->
            <div class="flex items-center mb-6">
              <input type="checkbox" id="favorite" th:field="*{favorite}" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 dark:focus:ring-blue-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
              <label for="favorite" class="ms-2 text-sm font-medium text-gray-900 dark:text-gray-300">Mark as favorite contact</label>
            </div>

            <!-- Buttons -->
            <div class="flex justify-center space-x-4">
              <button type="submit" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition duration-200">Add Contact</button>
              <button type="reset" class="px-5 py-2.5 bg-gray-600 hover:bg-gray-700 text-white font-medium rounded-lg transition duration-200">Reset</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script th:src="@{/js/admin.js}"></script>
<script>
  console.log("Add contact page loaded");
</script>
</body>
</html>
