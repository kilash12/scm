<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#content},~{::title},~{::script})}">
<head>
  <!-- FIX: null-safe -->
  <title th:text="${loggedInUser != null ? loggedInUser.name : 'User'} + ' | Dashboard'">Dashboard</title>
</head>
<body>
<div id="content">

  <!-- Sidebar -->
  <div th:if="${loggedInUser != null}" th:replace="~{user/sidebar :: sidebar}"></div>

  <div class="sm:pl-64 pt-20 min-h-screen bg-gray-50">
    <div class="container mx-auto px-4 py-8">

      <!-- Welcome -->
      <div class="bg-white rounded-2xl shadow-sm p-6 mb-8 border border-gray-100">
        <div class="flex items-center justify-between flex-wrap gap-4">
          <div>

            <!-- FIX -->
            <h1 class="text-3xl font-bold text-gray-800">
              Welcome back,
              <span th:text="${loggedInUser != null ? loggedInUser.name : 'User'}">User</span>!
            </h1>

            <p class="text-gray-500 mt-1">Here's what's happening with your contacts today.</p>
          </div>

          <a th:href="@{/user/contacts/add}"
             class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg transition flex items-center gap-2">
            <i class="fas fa-plus"></i> Add New Contact
          </a>
        </div>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">

        <!-- FIX -->
        <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
          <p class="text-gray-500 text-sm">Total Contacts</p>
          <p class="text-3xl font-bold text-gray-800"
             th:text="${totalContacts != null ? totalContacts : 0}">0</p>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
          <p class="text-gray-500 text-sm">Favorite Contacts</p>
          <p class="text-3xl font-bold text-gray-800"
             th:text="${favoriteContacts != null ? favoriteContacts : 0}">0</p>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
          <p class="text-gray-500 text-sm">Upcoming Reminders</p>
          <p class="text-3xl font-bold text-gray-800"
             th:text="${reminders != null ? reminders : 0}">0</p>
        </div>

      </div>

      <!-- Table -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">

        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
          <h2 class="text-xl font-semibold text-gray-800">Recent Contacts</h2>
          <a th:href="@{/user/contacts}" class="text-indigo-600">View all →</a>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full">

            <thead class="bg-gray-50">
            <tr>
              <th class="px-6 py-3">Name</th>
              <th class="px-6 py-3">Email</th>
              <th class="px-6 py-3">Phone</th>
              <th class="px-6 py-3 text-right">Actions</th>
            </tr>
            </thead>

            <tbody>

            <!-- FIX: null-safe -->
            <tr th:each="contact : ${recentContacts}"
                th:if="${recentContacts != null}">

              <td class="px-6 py-4">
                <div class="flex items-center">

                  <div class="h-10 w-10">

                    <!-- FIX -->
                    <img th:if="${contact.picture != null}"
                         th:src="${contact.picture}"
                         class="h-10 w-10 rounded-full"
                         alt="profile"/>

                    <div th:unless="${contact.picture != null}"
                         class="h-10 w-10 rounded-full bg-indigo-100 flex items-center justify-center">

                      <!-- FIX -->
                      <span th:text="${contact.name != null ? #strings.substring(contact.name,0,1) : 'U'}"></span>
                    </div>

                  </div>

                  <div class="ml-4">
                    <div th:text="${contact.name != null ? contact.name : 'No Name'}"></div>
                  </div>

                </div>
              </td>

              <td th:text="${contact.email != null ? contact.email : '-'}"></td>
              <td th:text="${contact.phoneNumber != null ? contact.phoneNumber : '-'}"></td>

              <td class="text-right">

                <!-- FIX -->
                <a th:href="@{/user/contacts/view/{id}(id=${contact.id})}">View</a>

                <a th:href="@{/user/contacts/delete/{id}(id=${contact.id})}"
                   onclick="return confirm('Are you sure?')">Delete</a>

              </td>

            </tr>

            <!-- EMPTY -->
            <tr th:if="${recentContacts == null}">
              <td colspan="4">No contacts yet</td>
            </tr>

            </tbody>

          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  console.log("Dashboard page loaded");
</script>

</body>
</html>
